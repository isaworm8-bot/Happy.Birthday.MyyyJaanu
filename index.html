<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Birthday Pamphlet</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#ececec;
      font-family: "Poppins", sans-serif;
    }

    .pamphlet{
      width:390px;
      height:844px;
      background:url("1000004062.jpg");
      background-size:cover;
      background-position:center;
      position:relative;
      overflow:hidden;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    .message{
      position:absolute;
      top:300px;
      left:30px;
      right:30px;
      text-align:center;
      color:#4f6788;
      font-size:28px;
      line-height:1.7;
      font-weight:600;
      text-shadow:0 2px 8px rgba(255,255,255,0.7);
      animation:fadeIn 2s ease;
    }

    .heart{
      position:absolute;
      color:#ff8db3;
      font-size:20px;
      animation:float 5s infinite ease-in-out;
      opacity:0.8;
    }

    .heart:nth-child(2){
      left:15%;
      bottom:120px;
      animation-delay:1s;
    }

    .heart:nth-child(3){
      right:20%;
      bottom:180px;
      animation-delay:2s;
    }

    .heart:nth-child(4){
      left:50%;
      bottom:90px;
      animation-delay:0s;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @keyframes float{
      0%{
        transform:translateY(0px);
        opacity:0.8;
      }
      50%{
        transform:translateY(-25px);
        opacity:1;
      }
      100%{
        transform:translateY(0px);
        opacity:0.8;
      }
    }
  </style>
</head>

<body>

  <div class="pamphlet">

    <div class="message">
      Happy 21st Birthday My Love 💙 <br><br>
      I love you to Infinity and Beyond 💗
    </div>

    <div class="heart">💗</div>
    <div class="heart">💗</div>
    <div class="heart">💗</div>

  </div>

</body>
</html>
