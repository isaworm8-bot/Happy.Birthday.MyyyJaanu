<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Birthday Pamphlet</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      background:#ececec;
      font-family: 'Poppins', sans-serif;
    }

    .pamphlet{
      position:relative;
      width:390px;
      height:844px;

      /* YOUR EXACT IMAGE */
      background-image:url("1000004062.jpg");
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;

      overflow:hidden;
      border-radius:18px;
      box-shadow:0 10px 30px rgba(0,0,0,0.15);
    }

    .message{
      position:absolute;
      top:290px;
      left:35px;
      right:35px;

      text-align:center;
      color:#5f6f91;

      font-size:29px;
      font-weight:600;
      line-height:1.7;

      text-shadow:0 2px 10px rgba(255,255,255,0.9);

      animation:fadeIn 2s ease;
    }

    .heart{
      position:absolute;
      color:#ff8db6;
      font-size:24px;
      opacity:0.85;

      animation:float 5s ease-in-out infinite;
    }

    .heart1{
      left:18%;
      bottom:130px;
      animation-delay:0s;
    }

    .heart2{
      right:18%;
      bottom:170px;
      animation-delay:1.5s;
    }

    .heart3{
      left:48%;
      bottom:90px;
      animation-delay:3s;
    }

    @keyframes float{
      0%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(-25px);
      }

      100%{
        transform:translateY(0px);
      }
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }
    }

  </style>
</head>

<body>

  <div class="pamphlet">

    <div class="message">
      Happy 21st Birthday My Love 💙 <br><br>
      I love you to Infinity and Beyond 💗
    </div>

    <div class="heart heart1">💗</div>
    <div class="heart heart2">💗</div>
    <div class="heart heart3">💗</div>

  </div>

</body>
</html>
